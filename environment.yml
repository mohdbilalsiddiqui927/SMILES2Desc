# SMILES2Desc — conda environment
# Create: conda env create -f environment.yml
# Activate: conda activate smiles2desc

name: smiles2desc
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - rdkit>=2023.9.1
  - pandas>=2.0.0
  - pillow>=10.0.0
  - openpyxl>=3.1.2
  - pip
  - pip:
      - streamlit>=1.32.0
      - mordred>=1.2.0
